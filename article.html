<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - Amorend</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #11110f;
            --bg-soft: #1a1916;
            --paper: #efeadf;
            --paper-muted: rgba(239, 234, 223, 0.68);
            --line: rgba(239, 234, 223, 0.2);
            --line-strong: rgba(239, 234, 223, 0.48);
            --accent: #d75b3f;
            --accent-2: #b8a45d;
            --nav-bg: rgba(17, 17, 15, 0.78);
            --font-sans: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-mono: "SF Mono", Monaco, "Cascadia Code", monospace;
        }

        [data-theme="light"] {
            --bg: #eee8dc;
            --bg-soft: #ded5c6;
            --paper: #151512;
            --paper-muted: rgba(21, 21, 18, 0.64);
            --line: rgba(21, 21, 18, 0.18);
            --line-strong: rgba(21, 21, 18, 0.42);
            --accent: #a93425;
            --accent-2: #7c642d;
            --nav-bg: rgba(238, 232, 220, 0.78);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            overflow-x: hidden;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(180deg, var(--bg), var(--bg-soft) 45%, var(--bg) 100%);
            background-size: 84px 84px, auto;
            color: var(--paper);
            font-family: var(--font-sans);
            line-height: 1.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            color: inherit;
            font: inherit;
        }

        #string-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.32;
            mix-blend-mode: screen;
        }

        [data-theme="light"] #string-canvas {
            opacity: 0.24;
            mix-blend-mode: multiply;
        }

        header {
            position: fixed;
            top: 18px;
            left: 50%;
            z-index: 40;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 2rem;
            align-items: center;
            width: min(1180px, calc(100% - 32px));
            padding: 0.9rem 1rem;
            transform: translateX(-50%);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            text-transform: uppercase;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 0.12em;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: clamp(0.8rem, 3vw, 2rem);
        }

        .nav-links a {
            position: relative;
            border: 0;
            background: transparent;
            cursor: pointer;
            opacity: 0.78;
            transition: color 0.25s ease, opacity 0.25s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
            opacity: 1;
        }

        .theme-toggle {
            position: relative;
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: transparent;
            color: var(--paper);
            cursor: pointer;
            opacity: 0.84;
            transition: border-color 0.25s ease, color 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            opacity: 1;
            transform: translateY(-2px);
        }

        .theme-toggle svg {
            position: absolute;
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .theme-toggle .moon-icon {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .theme-toggle .sun-icon {
            opacity: 0;
            transform: scale(0.55) rotate(-45deg);
        }

        [data-theme="light"] .theme-toggle .moon-icon {
            opacity: 0;
            transform: scale(0.55) rotate(45deg);
        }

        [data-theme="light"] .theme-toggle .sun-icon {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .scroll-progress {
            position: fixed;
            right: 24px;
            bottom: 22px;
            z-index: 45;
            display: grid;
            place-items: center;
            width: 76px;
            height: 76px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            font-family: var(--font-mono);
            font-size: 0.76rem;
        }

        .scroll-progress svg {
            position: absolute;
            inset: 8px;
            transform: rotate(-90deg);
        }

        .scroll-progress circle {
            fill: none;
            stroke-width: 4;
        }

        .scroll-progress .track {
            stroke: var(--line);
        }

        .scroll-progress .fill {
            stroke: var(--accent);
            stroke-linecap: round;
            stroke-dasharray: 163.36;
            stroke-dashoffset: 163.36;
        }

        main {
            position: relative;
            z-index: 1;
            width: min(1120px, calc(100% - 2.5rem));
            margin: 0 auto;
            padding: clamp(8rem, 14vw, 11rem) 0 clamp(5rem, 10vw, 8rem);
        }

        .article-hero {
            min-height: 62svh;
            display: grid;
            align-content: end;
            gap: clamp(1.25rem, 4vw, 2.5rem);
            border-bottom: 1px solid var(--line);
            padding-bottom: clamp(2rem, 6vw, 4rem);
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            color: var(--paper-muted);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .tag {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0.25rem 0.6rem;
            color: var(--accent-2);
        }

        .article-title {
            max-width: 11ch;
            font-size: clamp(3rem, 10vw, 8.5rem);
            font-weight: 900;
            line-height: 0.92;
            letter-spacing: 0;
            text-wrap: balance;
        }

        .article-excerpt {
            max-width: 760px;
            color: var(--paper-muted);
            font-size: clamp(1.05rem, 2vw, 1.45rem);
            line-height: 1.45;
        }

        .article-layout {
            display: grid;
            grid-template-columns: minmax(150px, 0.28fr) minmax(0, 1fr);
            gap: clamp(1.5rem, 5vw, 5rem);
            padding-top: clamp(2rem, 6vw, 4rem);
        }

        .article-side {
            position: sticky;
            top: 7rem;
            align-self: start;
            display: grid;
            gap: 1rem;
            color: var(--paper-muted);
            font-family: var(--font-mono);
            font-size: 0.78rem;
        }

        .side-link {
            display: inline-flex;
            width: fit-content;
            min-height: 40px;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0.62rem 0.9rem;
            transition: border-color 0.25s ease, color 0.25s ease;
        }

        .side-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .article-body {
            max-width: 760px;
            color: var(--paper-muted);
            font-size: clamp(1rem, 1.4vw, 1.08rem);
            line-height: 1.88;
        }

        .article-body h1,
        .article-body h2,
        .article-body h3 {
            color: var(--paper);
            line-height: 1.16;
            margin: 2.3rem 0 1rem;
            text-wrap: balance;
        }

        .article-body h1 {
            font-size: clamp(2rem, 5vw, 3.8rem);
        }

        .article-body h2 {
            font-size: clamp(1.65rem, 3.5vw, 2.6rem);
        }

        .article-body h3 {
            font-size: clamp(1.25rem, 2.6vw, 1.7rem);
            color: var(--accent-2);
        }

        .article-body p,
        .article-body ul,
        .article-body ol,
        .article-body blockquote,
        .article-body pre {
            margin-bottom: 1.15rem;
        }

        .article-body ul,
        .article-body ol {
            padding-left: 1.3rem;
        }

        .article-body blockquote {
            border-left: 2px solid var(--accent);
            padding-left: 1rem;
            color: var(--paper);
        }

        .article-body a {
            color: var(--accent);
            border-bottom: 1px solid currentColor;
        }

        .article-body code {
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 0.14rem 0.35rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--paper);
            font-family: var(--font-mono);
            font-size: 0.9em;
        }

        .article-body pre {
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.26);
        }

        .article-body pre code {
            border: 0;
            padding: 0;
            background: transparent;
        }

        .article-footer {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
            margin-top: clamp(3rem, 7vw, 5rem);
            padding-top: 2rem;
            border-top: 1px solid var(--line);
        }

        .next-card {
            min-height: 150px;
            display: grid;
            align-content: space-between;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 1rem;
            transition: border-color 0.25s ease, background 0.25s ease;
        }

        .next-card:hover {
            border-color: var(--accent);
            background: rgba(215, 91, 63, 0.08);
        }

        .next-card span {
            color: var(--paper-muted);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .next-card strong {
            font-size: clamp(1.25rem, 2.6vw, 2rem);
            line-height: 1.05;
        }

        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--line);
            padding: 2rem clamp(1.25rem, 5vw, 4.5rem);
            color: var(--paper-muted);
            font-family: var(--font-mono);
            font-size: 0.78rem;
        }

        footer .footer-inner {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            width: min(1120px, 100%);
            margin: 0 auto;
        }

        .loading {
            min-height: 60svh;
            display: grid;
            place-items: center;
            color: var(--paper-muted);
            font-family: var(--font-mono);
        }

        @media (max-width: 760px) {
            header {
                grid-template-columns: 1fr auto;
                gap: 1rem;
                align-items: start;
            }

            .nav-links {
                grid-column: 1 / -1;
                justify-content: flex-start;
                flex-wrap: wrap;
            }

            main {
                width: calc(100% - 2.5rem);
                padding-top: 9.5rem;
            }

            .article-layout,
            .article-footer {
                grid-template-columns: 1fr;
            }

            .article-side {
                position: relative;
                top: auto;
                border-bottom: 1px solid var(--line);
                padding-bottom: 1rem;
            }

            .scroll-progress {
                width: 62px;
                height: 62px;
                right: 14px;
                bottom: 14px;
            }

            footer .footer-inner {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <canvas id="string-canvas"></canvas>

    <header>
        <a class="logo" href="blog.html">Amorend</a>
        <nav class="nav-links" aria-label="文章导航">
            <a href="blog.html">博客</a>
            <a href="blog.html#journal">文章</a>
            <a href="#contact">联系</a>
        </nav>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换到亮色模式" title="切换明暗模式">
            <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 14.6A8.5 8.5 0 0 1 9.4 3a7 7 0 1 0 11.6 11.6Z"/>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/>
            </svg>
        </button>
    </header>

    <div class="scroll-progress" aria-hidden="true">
        <svg viewBox="0 0 60 60">
            <circle class="track" cx="30" cy="30" r="26"></circle>
            <circle class="fill" id="progress-ring" cx="30" cy="30" r="26"></circle>
        </svg>
        <span id="progress-text">0%</span>
    </div>

    <main id="article-root">
        <div class="loading">文章加载中...</div>
    </main>

    <footer id="contact">
        <div class="footer-inner">
            <span>Amorend © 2026</span>
            <a href="mailto:evilgenius0256@gmail.com">evilgenius0256@gmail.com</a>
        </div>
    </footer>

    <script>
        const root = document.documentElement;
        const articleRoot = document.getElementById('article-root');
        const progressText = document.getElementById('progress-text');
        const progressRing = document.getElementById('progress-ring');
        const themeToggle = document.getElementById('theme-toggle');
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            root.setAttribute('data-theme', 'light');
        }

        function syncThemeToggleLabel() {
            const isLight = root.getAttribute('data-theme') === 'light';
            themeToggle.setAttribute('aria-label', isLight ? '切换到深色模式' : '切换到亮色模式');
            themeToggle.setAttribute('title', isLight ? '切换到深色模式' : '切换到亮色模式');
        }

        syncThemeToggleLabel();

        themeToggle.addEventListener('click', () => {
            root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
            syncThemeToggleLabel();
        });

        if (window.gsap && window.ScrollTrigger) {
            gsap.registerPlugin(ScrollTrigger);
        }

        if (window.Lenis && !prefersReducedMotion) {
            const lenis = new Lenis({
                duration: 0.92,
                easing: (t) => 1 - Math.pow(1 - t, 4),
                smoothWheel: true,
                touchMultiplier: 1.4
            });

            if (window.gsap && window.ScrollTrigger) {
                lenis.on('scroll', ScrollTrigger.update);
                gsap.ticker.add((time) => lenis.raf(time * 1000));
                gsap.ticker.lagSmoothing(0);
            } else {
                function raf(time) {
                    lenis.raf(time);
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);
            }
        }

        function escapeHTML(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function updateProgress() {
            const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
            const progress = Math.min(1, Math.max(0, window.scrollY / maxScroll));
            const circumference = 2 * Math.PI * 26;
            progressText.textContent = Math.round(progress * 100) + '%';
            progressRing.style.strokeDashoffset = String(circumference * (1 - progress));
        }

        document.addEventListener('scroll', updateProgress, { passive: true });
        window.addEventListener('resize', updateProgress);
        updateProgress();

        function parseFrontmatter(markdown) {
            const match = markdown.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
            if (!match) return { content: markdown };

            const frontmatter = {};
            match[1].split('\n').forEach((line) => {
                const colonIndex = line.indexOf(':');
                if (colonIndex === -1) return;
                const key = line.slice(0, colonIndex).trim();
                const value = line.slice(colonIndex + 1).trim().replace(/^['"]|['"]$/g, '');
                frontmatter[key] = value;
            });

            return { ...frontmatter, content: match[2] };
        }

        async function loadIndex() {
            const response = await fetch('blog/index.json');
            if (!response.ok) throw new Error('文章索引加载失败：' + response.status);
            const posts = await response.json();
            return [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function getPostId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('post') || '';
        }

        function navCard(post, label) {
            if (!post) return '<span></span>';
            return `
                <a class="next-card" href="article.html?post=${encodeURIComponent(post.id)}">
                    <span>${label}</span>
                    <strong>${escapeHTML(post.title)}</strong>
                </a>
            `;
        }

        async function renderArticle() {
            const posts = await loadIndex();
            const postId = getPostId();
            const index = posts.findIndex((post) => post.id === postId);
            const post = posts[index];

            if (!post) {
                document.title = '文章不存在 - Amorend';
                articleRoot.innerHTML = `
                    <section class="article-hero">
                        <div class="article-meta"><span class="tag">404</span></div>
                        <h1 class="article-title">文章不存在</h1>
                        <p class="article-excerpt">这个文章 ID 没有出现在博客索引里，回到博客列表重新选择一篇吧。</p>
                        <a class="side-link" href="blog.html">返回博客</a>
                    </section>
                `;
                return;
            }

            const response = await fetch('blog/' + post.file);
            if (!response.ok) throw new Error('文章文件加载失败：' + response.status);
            const markdown = await response.text();
            const parsed = parseFrontmatter(markdown);
            const article = { ...post, ...parsed };
            const htmlContent = window.marked
                ? marked.parse(article.content)
                : '<pre>' + escapeHTML(article.content) + '</pre>';

            document.title = article.title + ' - Amorend';
            articleRoot.innerHTML = `
                <section class="article-hero">
                    <div class="article-meta">
                        <time datetime="${escapeHTML(article.date)}">${escapeHTML(article.date)}</time>
                        <span class="tag">#${escapeHTML(article.tag)}</span>
                    </div>
                    <h1 class="article-title">${escapeHTML(article.title)}</h1>
                    <p class="article-excerpt">${escapeHTML(article.excerpt || '')}</p>
                </section>

                <div class="article-layout">
                    <aside class="article-side">
                        <a class="side-link" href="blog.html">返回博客</a>
                        <span>Reading / ${String(index + 1).padStart(2, '0')}</span>
                    </aside>
                    <article>
                        <div class="article-body">${htmlContent}</div>
                        <nav class="article-footer" aria-label="相邻文章">
                            ${navCard(posts[index + 1], 'Previous Signal')}
                            ${navCard(posts[index - 1], 'Next Signal')}
                        </nav>
                    </article>
                </div>
            `;

            if (window.gsap && !prefersReducedMotion) {
                gsap.from('.article-title', { y: 80, opacity: 0, duration: 0.9, ease: 'power4.out' });
                gsap.from('.article-excerpt, .article-meta', { y: 32, opacity: 0, duration: 0.7, delay: 0.12, ease: 'power3.out' });
                gsap.from('.article-body > *', {
                    y: 30,
                    opacity: 0,
                    duration: 0.55,
                    stagger: 0.025,
                    ease: 'power2.out',
                    scrollTrigger: {
                        trigger: '.article-body',
                        start: 'top 82%'
                    }
                });
            }

            updateProgress();
        }

        (function initStringCanvas() {
            const canvas = document.getElementById('string-canvas');
            const ctx = canvas.getContext('2d');
            let width = 0;
            let height = 0;
            let dpr = 1;
            let pointerX = -9999;
            let pointerY = -9999;
            let influence = 0;
            const strings = [];

            function resize() {
                dpr = window.devicePixelRatio || 1;
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                strings.length = 0;
                const count = Math.max(18, Math.round(width / 52));
                for (let i = 0; i < count; i++) {
                    strings.push({
                        x: (i / Math.max(1, count - 1)) * width,
                        phase: Math.random() * Math.PI * 2,
                        amplitude: 10 + Math.random() * 24,
                        speed: 0.0006 + Math.random() * 0.0012
                    });
                }
            }

            function draw(time) {
                ctx.clearRect(0, 0, width, height);
                const styles = getComputedStyle(root);
                const accent = styles.getPropertyValue('--accent').trim() || '#d75b3f';
                const line = styles.getPropertyValue('--line-strong').trim() || 'rgba(239,234,223,.5)';

                strings.forEach((string, index) => {
                    ctx.beginPath();
                    ctx.lineWidth = index % 5 === 0 ? 1.2 : 0.7;
                    ctx.strokeStyle = index % 4 === 0 ? accent : line;
                    ctx.globalAlpha = index % 4 === 0 ? 0.26 : 0.18;

                    for (let y = -10; y <= height + 10; y += 16) {
                        const wave = Math.sin(y * 0.012 + string.phase + time * string.speed) * string.amplitude;
                        const dx = string.x + wave - pointerX;
                        const dy = y - pointerY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const range = 140;
                        let pull = 0;

                        if (distance < range && influence > 0) {
                            const force = (1 - distance / range) * influence;
                            pull = Math.sin(distance * 0.06 - time * 0.004) * 22 * force;
                        }

                        const x = string.x + wave + pull;
                        if (y === -10) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }

                    ctx.stroke();
                });

                influence = Math.max(0, influence - 0.012);
                requestAnimationFrame(draw);
            }

            document.addEventListener('pointermove', (event) => {
                pointerX = event.clientX;
                pointerY = event.clientY;
                influence = Math.min(0.5, influence + 0.05);
            }, { passive: true });

            document.addEventListener('pointerleave', () => {
                pointerX = -9999;
                pointerY = -9999;
            });

            window.addEventListener('resize', resize);
            resize();
            requestAnimationFrame(draw);
        })();

        renderArticle().catch((error) => {
            console.error(error);
            articleRoot.innerHTML = `
                <section class="article-hero">
                    <div class="article-meta"><span class="tag">Error</span></div>
                    <h1 class="article-title">文章加载失败</h1>
                    <p class="article-excerpt">请确认本地服务已启动，或刷新页面后重试。</p>
                    <a class="side-link" href="blog.html">返回博客</a>
                </section>
            `;
        });
    </script>
</body>
</html>
