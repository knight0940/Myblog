<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=blog.html">
    <link rel="canonical" href="blog.html">
    <title>Amorend - Blog</title>
    <style>
        :root {
            --bg: #11110f;
            --paper: #efeadf;
            --paper-muted: rgba(239, 234, 223, 0.68);
            --accent: #d75b3f;
            --line: rgba(239, 234, 223, 0.2);
            --font-sans: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-mono: "SF Mono", Monaco, "Cascadia Code", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(180deg, var(--bg), #1a1916 100%);
            background-size: 84px 84px, auto;
            color: var(--paper);
            font-family: var(--font-sans);
        }

        main {
            width: min(620px, calc(100% - 2rem));
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: clamp(1.5rem, 5vw, 3rem);
            background: rgba(255, 255, 255, 0.03);
        }

        p {
            color: var(--paper-muted);
            font-size: 1rem;
            line-height: 1.7;
        }

        a {
            display: inline-flex;
            margin-top: 1.2rem;
            min-height: 42px;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0.65rem 1rem;
            color: var(--paper);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: border-color 0.25s ease, color 0.25s ease;
        }

        a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
    <script>
        window.location.replace('blog.html');
    </script>
</head>
<body>
    <main>
        <p>正在进入新版 Blog。如果页面没有自动跳转，请点击下面的入口。</p>
        <a href="blog.html">Enter Blog</a>
    </main>
</body>
</html>
