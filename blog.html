<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - Amorend</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #11110f;
            --bg-soft: #1a1916;
            --paper: #efeadf;
            --paper-muted: rgba(239, 234, 223, 0.68);
            --ink: #10100f;
            --line: rgba(239, 234, 223, 0.2);
            --line-strong: rgba(239, 234, 223, 0.48);
            --accent: #d75b3f;
            --accent-2: #b8a45d;
            --accent-3: #75876a;
            --nav-bg: rgba(17, 17, 15, 0.78);
            --font-sans: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-mono: "SF Mono", Monaco, "Cascadia Code", monospace;
        }

        [data-theme="light"] {
            --bg: #eee8dc;
            --bg-soft: #ded5c6;
            --paper: #151512;
            --paper-muted: rgba(21, 21, 18, 0.64);
            --ink: #eee8dc;
            --line: rgba(21, 21, 18, 0.18);
            --line-strong: rgba(21, 21, 18, 0.42);
            --accent: #a93425;
            --accent-2: #7c642d;
            --accent-3: #526b50;
            --nav-bg: rgba(238, 232, 220, 0.78);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            overflow-x: hidden;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(180deg, var(--bg), var(--bg-soft) 44%, var(--bg) 100%);
            background-size: 84px 84px, auto;
            color: var(--paper);
            font-family: var(--font-sans);
            line-height: 1.5;
            transition: background-color 0.35s ease, color 0.35s ease;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            color: inherit;
            font: inherit;
        }

        #string-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.42;
            mix-blend-mode: screen;
        }

        [data-theme="light"] #string-canvas {
            opacity: 0.34;
            mix-blend-mode: multiply;
        }

        header {
            position: fixed;
            top: 18px;
            left: 50%;
            z-index: 40;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 2rem;
            align-items: center;
            width: min(1180px, calc(100% - 32px));
            padding: 0.9rem 1rem;
            transform: translateX(-50%);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            text-transform: uppercase;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 0.12em;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: clamp(0.8rem, 3vw, 2rem);
        }

        .nav-links a {
            position: relative;
            border: 0;
            background: transparent;
            cursor: pointer;
            opacity: 0.78;
            transition: color 0.25s ease, opacity 0.25s ease;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -0.35rem;
            width: 100%;
            height: 1px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.25s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
            opacity: 1;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .theme-toggle {
            position: relative;
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: transparent;
            color: var(--paper);
            cursor: pointer;
            opacity: 0.84;
            transition: border-color 0.25s ease, color 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            opacity: 1;
            transform: translateY(-2px);
        }

        .theme-toggle svg {
            position: absolute;
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .theme-toggle .moon-icon {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .theme-toggle .sun-icon {
            opacity: 0;
            transform: scale(0.55) rotate(-45deg);
        }

        [data-theme="light"] .theme-toggle .moon-icon {
            opacity: 0;
            transform: scale(0.55) rotate(45deg);
        }

        [data-theme="light"] .theme-toggle .sun-icon {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .scroll-progress {
            position: fixed;
            right: 24px;
            bottom: 22px;
            z-index: 45;
            display: grid;
            place-items: center;
            width: 76px;
            height: 76px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            font-family: var(--font-mono);
            font-size: 0.76rem;
        }

        .scroll-progress svg {
            position: absolute;
            inset: 8px;
            transform: rotate(-90deg);
        }

        .scroll-progress circle {
            fill: none;
            stroke-width: 4;
        }

        .scroll-progress .track {
            stroke: var(--line);
        }

        .scroll-progress .fill {
            stroke: var(--accent);
            stroke-linecap: round;
            stroke-dasharray: 163.36;
            stroke-dashoffset: 163.36;
        }

        .music-toggle {
            position: fixed;
            left: 24px;
            bottom: 22px;
            z-index: 45;
            display: grid;
            place-items: center;
            width: 52px;
            height: 52px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            cursor: pointer;
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        .music-toggle:hover,
        .music-toggle.playing {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .music-toggle svg {
            width: 21px;
            height: 21px;
            fill: var(--paper);
        }

        main {
            position: relative;
            z-index: 1;
        }

        .hero {
            min-height: 100svh;
            display: grid;
            grid-template-rows: 1fr auto;
            padding: clamp(6.5rem, 12vw, 9rem) clamp(1.25rem, 5vw, 4.5rem) 2rem;
        }

        .hero-inner {
            display: grid;
            align-content: center;
            gap: 1.5rem;
            max-width: 1320px;
            width: 100%;
            margin: 0 auto;
        }

        .eyebrow,
        .micro-copy,
        .chapter-kicker,
        .index-kicker {
            font-family: var(--font-mono);
            font-size: clamp(0.72rem, 1.1vw, 0.9rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--paper-muted);
        }

        .hero-title {
            max-width: 12ch;
            font-size: clamp(4.8rem, 17vw, 16rem);
            font-weight: 900;
            line-height: 0.78;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .split-char {
            display: inline-block;
            will-change: transform, opacity;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 0.32fr);
            gap: 2rem;
            align-items: end;
        }

        .hero-lead {
            max-width: 720px;
            font-size: clamp(1.25rem, 2.8vw, 2.8rem);
            line-height: 1.08;
            color: var(--paper-muted);
        }

        .hero-lead strong {
            color: var(--paper);
            font-weight: 800;
        }

        .hero-note {
            border-left: 1px solid var(--accent);
            padding-left: 1rem;
            color: var(--paper-muted);
            font-size: clamp(0.95rem, 1.4vw, 1.1rem);
        }

        .hero-footer {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: end;
            width: min(1320px, 100%);
            margin: 0 auto;
            border-top: 1px solid var(--line);
            padding-top: 1rem;
        }

        .scroll-cue {
            display: inline-flex;
            gap: 0.7rem;
            align-items: center;
            justify-self: end;
            font-family: var(--font-mono);
            color: var(--paper-muted);
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        .scroll-cue span {
            width: 9px;
            height: 9px;
            border-right: 1px solid var(--accent);
            border-bottom: 1px solid var(--accent);
            transform: rotate(45deg);
            animation: cueDrop 1.25s ease-in-out infinite;
        }

        @keyframes cueDrop {
            0%, 100% { transform: translateY(-4px) rotate(45deg); opacity: 0.35; }
            50% { transform: translateY(5px) rotate(45deg); opacity: 1; }
        }

        .tune-nav {
            position: fixed;
            top: 50%;
            right: 24px;
            z-index: 35;
            display: grid;
            gap: 0.65rem;
            transform: translateY(-50%);
        }

        .tune-nav button {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: var(--nav-bg);
            color: var(--paper-muted);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            transition: border-color 0.25s ease, color 0.25s ease, transform 0.25s ease;
        }

        .tune-nav button:hover,
        .tune-nav button.active {
            border-color: var(--accent);
            color: var(--paper);
            transform: translateX(-4px);
        }

        .chapters {
            border-top: 1px solid var(--line);
        }

        .chapter {
            min-height: 128vh;
            border-bottom: 1px solid var(--line);
            padding: 0 clamp(1.25rem, 5vw, 4.5rem);
        }

        .chapter-sticky {
            position: sticky;
            top: 0;
            min-height: 100svh;
            display: grid;
            grid-template-columns: minmax(150px, 0.26fr) minmax(0, 1fr);
            gap: clamp(1.5rem, 5vw, 5rem);
            align-items: center;
            width: min(1320px, 100%);
            margin: 0 auto;
            padding: clamp(6rem, 10vw, 8rem) 0 3rem;
        }

        .chapter-side {
            display: grid;
            gap: 1rem;
            align-self: stretch;
            align-content: center;
            border-right: 1px solid var(--line);
            padding-right: clamp(1rem, 3vw, 2rem);
        }

        .chapter-count {
            font-family: var(--font-mono);
            font-size: clamp(2.8rem, 7vw, 6rem);
            line-height: 0.85;
            color: transparent;
            -webkit-text-stroke: 1px var(--line-strong);
        }

        .chapter-date {
            font-family: var(--font-mono);
            color: var(--accent-2);
            font-size: 0.82rem;
        }

        .chapter-title {
            max-width: 10ch;
            font-size: clamp(3.2rem, 9vw, 8rem);
            font-weight: 900;
            line-height: 0.92;
            letter-spacing: 0;
            text-wrap: balance;
        }

        .chapter-copy {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 360px);
            gap: clamp(1.25rem, 4vw, 3rem);
            align-items: end;
            margin-top: clamp(2rem, 5vw, 4rem);
        }

        .chapter-excerpt {
            max-width: 760px;
            color: var(--paper-muted);
            font-size: clamp(1.05rem, 2vw, 1.55rem);
        }

        .open-post {
            justify-self: start;
            min-height: 44px;
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            background: transparent;
            padding: 0.75rem 1.1rem;
            color: var(--paper);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            text-transform: uppercase;
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        }

        .open-post:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            background: rgba(215, 91, 63, 0.1);
        }

        .loading-message {
            grid-column: 1 / -1;
            min-height: 280px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--paper-muted);
            font-family: var(--font-mono);
        }

        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--line);
            padding: 2rem clamp(1.25rem, 5vw, 4.5rem);
            color: var(--paper-muted);
            font-family: var(--font-mono);
            font-size: 0.78rem;
        }

        footer .footer-inner {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            width: min(1320px, 100%);
            margin: 0 auto;
        }

        @media (max-width: 760px) {
            .tune-nav {
                display: none;
            }

            header {
                grid-template-columns: 1fr auto;
                gap: 1rem;
                align-items: start;
            }

            .nav-links {
                grid-column: 1 / -1;
                justify-content: flex-start;
                flex-wrap: wrap;
            }

            .hero-grid,
            .hero-footer,
            .chapter-sticky,
            .chapter-copy {
                grid-template-columns: 1fr;
            }

            .hero {
                padding-top: 9.5rem;
            }

            .hero-title {
                font-size: clamp(4.2rem, 22vw, 7rem);
            }

            .chapter {
                min-height: auto;
                padding: 0 1.25rem;
            }

            .chapter-sticky {
                position: relative;
                min-height: auto;
                padding: 5rem 0;
            }

            .chapter-side {
                align-content: start;
                border-right: 0;
                border-bottom: 1px solid var(--line);
                padding-right: 0;
                padding-bottom: 1rem;
            }

            .chapter-title {
                font-size: clamp(2.8rem, 15vw, 4.8rem);
            }

            .scroll-progress {
                width: 62px;
                height: 62px;
                right: 14px;
                bottom: 14px;
            }

            .music-toggle {
                left: 14px;
                bottom: 14px;
            }

            footer .footer-inner {
                flex-direction: column;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="string-canvas"></canvas>

    <header>
        <a class="logo" href="#page-title">Amorend</a>
        <nav class="nav-links" aria-label="主导航">
            <a href="#chapter-research-log">研究</a>
            <a href="#chapter-photo-roll">摄影</a>
            <a href="#chapter-music-rotation">音乐</a>
            <a href="#chapter-social-links">社交</a>
            <a href="#chapter-inspiration-archive">灵感</a>
        </nav>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换到亮色模式" title="切换明暗模式">
            <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 14.6A8.5 8.5 0 0 1 9.4 3a7 7 0 1 0 11.6 11.6Z"/>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/>
            </svg>
        </button>
    </header>

    <div class="scroll-progress" aria-hidden="true">
        <svg viewBox="0 0 60 60">
            <circle class="track" cx="30" cy="30" r="26"></circle>
            <circle class="fill" id="progress-ring" cx="30" cy="30" r="26"></circle>
        </svg>
        <span id="progress-text">0%</span>
    </div>

    <button id="music-toggle" class="music-toggle" type="button" title="播放/暂停音乐" aria-label="播放或暂停音乐">
        <svg class="music-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
    </button>

    <audio id="bg-music" loop>
        <source src="Music/在雨后醒来.mp3" type="audio/mpeg">
    </audio>

    <nav class="tune-nav" id="tune-nav" aria-label="内容章节导航"></nav>

    <main>
        <section class="hero" aria-labelledby="page-title">
            <div class="hero-inner">
                <p class="eyebrow">v_2026 / Research Notes / Built by Amorend</p>
                <h1 class="hero-title" id="page-title" data-split>Blog</h1>
                <div class="hero-grid">
                    <p class="hero-lead">
                        把 <strong>AI、工程实践、研究笔记</strong> 调成一根可被滚动拨动的弦。
                    </p>
                    <p class="hero-note">
                        每个版块是一段信号：文章、影像、音乐、社交和灵感，会在这里汇合。
                    </p>
                </div>
            </div>
            <div class="hero-footer">
                <p class="micro-copy">Concentrate / Keep Scrolling / Let the notes unfold</p>
                <div class="scroll-cue"><span></span>Scroll</div>
            </div>
        </section>

        <section class="chapters" id="featured-chapters" aria-label="内容频道">
            <div class="loading-message">内容频道加载中...</div>
        </section>

    </main>

    <footer id="contact">
        <div class="footer-inner">
            <span>Amorend © 2026</span>
            <a href="mailto:evilgenius0256@gmail.com">evilgenius0256@gmail.com</a>
        </div>
    </footer>

    <script>
        const root = document.documentElement;
        const hasGSAP = window.gsap && window.ScrollTrigger;
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let lenis = null;
        const featureSections = [
            {
                id: 'research-log',
                kicker: 'Channel / Research',
                title: '研究手记',
                date: 'AI / CV / LLM',
                excerpt: '记录我在 AI Agent、计算机视觉、大语言模型和医学影像方向里的问题意识、实验路径和阶段性判断。',
                actionText: 'Read Article',
                actionHref: 'article.html?post=ai-agent-paradigms'
            },
            {
                id: 'photo-roll',
                kicker: 'Channel / Photography',
                title: '摄影集',
                date: 'Frames / Daily Life',
                excerpt: '放一些生活里的构图、光线和瞬间。它不一定服务于技术，但会保存我观察世界的方式。',
                actionText: 'Coming Soon',
                actionHref: '#contact'
            },
            {
                id: 'music-rotation',
                kicker: 'Channel / Music',
                title: '正在听',
                date: 'Loop / 在雨后醒来',
                excerpt: '音乐是我切换状态的开关。这里会放最近循环、写代码时的歌单，以及一些和情绪有关的片段。',
                actionText: 'Play Music',
                actionHref: '#music-toggle',
                actionType: 'music'
            },
            {
                id: 'social-links',
                kicker: 'Channel / Social',
                title: '社交媒体',
                date: 'Connect / Share',
                excerpt: '以后这里会汇总我在不同平台的输出：研究动态、项目进展、自媒体观察，以及一些短想法。',
                actionText: 'Contact Me',
                actionHref: '#contact'
            },
            {
                id: 'inspiration-archive',
                kicker: 'Channel / Archive',
                title: '灵感档案',
                date: 'Notes / References',
                excerpt: '把暂时还没有长成文章的想法放在这里：一句话、一个问题、一张图、一次对话，先存档再发酵。',
                actionText: 'Read Notes',
                actionHref: 'article.html?post=data-collection'
            }
        ];

        const elements = {
            progressText: document.getElementById('progress-text'),
            progressRing: document.getElementById('progress-ring'),
            tuneNav: document.getElementById('tune-nav'),
            chapters: document.getElementById('featured-chapters'),
            musicToggle: document.getElementById('music-toggle'),
            bgMusic: document.getElementById('bg-music'),
            themeToggle: document.getElementById('theme-toggle')
        };

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            root.setAttribute('data-theme', 'light');
        }

        function syncThemeToggleLabel() {
            const isLight = root.getAttribute('data-theme') === 'light';
            elements.themeToggle.setAttribute('aria-label', isLight ? '切换到深色模式' : '切换到亮色模式');
            elements.themeToggle.setAttribute('title', isLight ? '切换到深色模式' : '切换到亮色模式');
        }

        syncThemeToggleLabel();

        elements.themeToggle.addEventListener('click', () => {
            root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
            syncThemeToggleLabel();
        });

        if (hasGSAP) {
            gsap.registerPlugin(ScrollTrigger);
        }

        if (window.Lenis && !prefersReducedMotion) {
            lenis = new Lenis({
                duration: 0.92,
                easing: (t) => 1 - Math.pow(1 - t, 4),
                smoothWheel: true,
                touchMultiplier: 1.4,
                prevent: (node) => node.closest('[data-lenis-prevent]') !== null
            });

            if (hasGSAP) {
                lenis.on('scroll', ScrollTrigger.update);
                gsap.ticker.add((time) => lenis.raf(time * 1000));
                gsap.ticker.lagSmoothing(0);
            } else {
                function raf(time) {
                    lenis.raf(time);
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);
            }
        }

        function escapeHTML(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatCount(index) {
            return String(index + 1).padStart(2, '0');
        }

        function updateProgress() {
            const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
            const progress = Math.min(1, Math.max(0, window.scrollY / maxScroll));
            const percent = Math.round(progress * 100);
            const circumference = 2 * Math.PI * 26;
            elements.progressText.textContent = percent + '%';
            elements.progressRing.style.strokeDashoffset = String(circumference * (1 - progress));
        }

        document.addEventListener('scroll', updateProgress, { passive: true });
        window.addEventListener('resize', updateProgress);
        updateProgress();

        elements.musicToggle.addEventListener('click', () => {
            if (elements.bgMusic.paused) {
                elements.bgMusic.play().then(() => {
                    elements.musicToggle.classList.add('playing');
                }).catch(() => {
                    elements.musicToggle.classList.remove('playing');
                });
            } else {
                elements.bgMusic.pause();
                elements.musicToggle.classList.remove('playing');
            }
        });

        function splitText() {
            document.querySelectorAll('[data-split]').forEach((node) => {
                const text = node.textContent;
                node.setAttribute('aria-label', text);
                node.textContent = '';
                Array.from(text).forEach((char) => {
                    const span = document.createElement('span');
                    span.className = 'split-char';
                    span.setAttribute('aria-hidden', 'true');
                    span.innerHTML = char === ' ' ? '&nbsp;' : escapeHTML(char);
                    node.appendChild(span);
                });
            });
        }

        function createChapter(section, index) {
            const safeTitle = escapeHTML(section.title);
            const safeExcerpt = escapeHTML(section.excerpt);
            const safeKicker = escapeHTML(section.kicker);
            const safeDate = escapeHTML(section.date);
            const safeHref = escapeHTML(section.actionHref);
            const safeAction = escapeHTML(section.actionText);
            const action = section.actionType === 'music'
                ? `<button class="open-post" type="button" data-play-music>${safeAction}</button>`
                : `<a class="open-post" href="${safeHref}">${safeAction}</a>`;
            return `
                <article class="chapter" id="chapter-${section.id}">
                    <div class="chapter-sticky">
                        <aside class="chapter-side">
                            <p class="chapter-kicker">${safeKicker}</p>
                            <div class="chapter-count">${formatCount(index)}</div>
                            <p class="chapter-date">${safeDate}</p>
                        </aside>
                        <div>
                            <h2 class="chapter-title" data-split>${safeTitle}</h2>
                            <div class="chapter-copy">
                                <p class="chapter-excerpt">${safeExcerpt}</p>
                                ${action}
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }

        function renderChannels() {
            elements.chapters.innerHTML = featureSections.map(createChapter).join('');

            elements.tuneNav.innerHTML = featureSections.map((section, index) => `
                <button type="button" data-jump="#chapter-${escapeHTML(section.id)}" aria-label="跳转到第 ${index + 1} 个内容频道">${formatCount(index)}</button>
            `).join('');

            splitText();
            bindPostEvents();
            initAnimations();
            updateProgress();
        }

        function bindPostEvents() {
            document.querySelectorAll('[data-play-music]').forEach((button) => {
                button.addEventListener('click', () => elements.musicToggle.click());
            });

            document.querySelectorAll('[data-jump]').forEach((button) => {
                button.addEventListener('click', () => {
                    const target = document.querySelector(button.dataset.jump);
                    if (!target) return;
                    if (lenis) {
                        lenis.scrollTo(target);
                    } else {
                        target.scrollIntoView({ behavior: prefersReducedMotion ? 'auto' : 'smooth' });
                    }
                });
            });

        }

        function initAnimations() {
            if (!hasGSAP || prefersReducedMotion) return;

            gsap.from('.hero .split-char', {
                yPercent: 110,
                opacity: 0,
                rotate: 3,
                duration: 0.95,
                ease: 'power4.out',
                stagger: 0.018,
                scrollTrigger: {
                    trigger: '.hero',
                    start: 'top 70%'
                }
            });

            gsap.utils.toArray('.chapter').forEach((chapter) => {
                const title = chapter.querySelector('.chapter-title');
                const copy = chapter.querySelector('.chapter-copy');
                const count = chapter.querySelector('.chapter-count');

                gsap.from(title.querySelectorAll('.split-char'), {
                    yPercent: 90,
                    opacity: 0.1,
                    stagger: 0.01,
                    ease: 'none',
                    scrollTrigger: {
                        trigger: chapter,
                        start: 'top 72%',
                        end: 'top 24%',
                        scrub: true
                    }
                });

                gsap.from(copy, {
                    y: 70,
                    opacity: 0,
                    ease: 'none',
                    scrollTrigger: {
                        trigger: chapter,
                        start: 'top 58%',
                        end: 'top 18%',
                        scrub: true
                    }
                });

                gsap.to(count, {
                    color: 'var(--accent)',
                    ease: 'none',
                    scrollTrigger: {
                        trigger: chapter,
                        start: 'top center',
                        end: 'bottom center',
                        scrub: true
                    }
                });
            });

            ScrollTrigger.create({
                trigger: '.chapters',
                start: 'top top',
                end: 'bottom bottom',
                onUpdate: syncChapterNav
            });

            ScrollTrigger.refresh();
        }

        function syncChapterNav() {
            const chapters = Array.from(document.querySelectorAll('.chapter'));
            const buttons = Array.from(elements.tuneNav.querySelectorAll('button'));
            if (!chapters.length) return;

            const viewportMid = window.innerHeight / 2;
            let activeIndex = 0;
            let bestDistance = Infinity;

            chapters.forEach((chapter, index) => {
                const rect = chapter.getBoundingClientRect();
                const distance = Math.abs(rect.top + rect.height / 2 - viewportMid);
                if (distance < bestDistance) {
                    bestDistance = distance;
                    activeIndex = index;
                }
            });

            buttons.forEach((button, index) => {
                button.classList.toggle('active', index === activeIndex);
            });
        }

        (function initStringCanvas() {
            const canvas = document.getElementById('string-canvas');
            const ctx = canvas.getContext('2d');
            let width = 0;
            let height = 0;
            let dpr = 1;
            let pointerX = -9999;
            let pointerY = -9999;
            let influence = 0;
            const strings = [];

            function resize() {
                dpr = window.devicePixelRatio || 1;
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                strings.length = 0;
                const count = Math.max(18, Math.round(width / 46));
                for (let i = 0; i < count; i++) {
                    strings.push({
                        x: (i / Math.max(1, count - 1)) * width,
                        phase: Math.random() * Math.PI * 2,
                        amplitude: 12 + Math.random() * 32,
                        speed: 0.0007 + Math.random() * 0.0015
                    });
                }
            }

            function draw(time) {
                ctx.clearRect(0, 0, width, height);
                const styles = getComputedStyle(root);
                const accent = styles.getPropertyValue('--accent').trim() || '#d75b3f';
                const line = styles.getPropertyValue('--line-strong').trim() || 'rgba(239,234,223,.5)';

                strings.forEach((string, index) => {
                    ctx.beginPath();
                    ctx.lineWidth = index % 5 === 0 ? 1.4 : 0.8;
                    ctx.strokeStyle = index % 4 === 0 ? accent : line;
                    ctx.globalAlpha = index % 4 === 0 ? 0.36 : 0.24;

                    for (let y = -10; y <= height + 10; y += 14) {
                        const wave = Math.sin(y * 0.012 + string.phase + time * string.speed) * string.amplitude;
                        const dx = string.x + wave - pointerX;
                        const dy = y - pointerY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const range = 150;
                        let pull = 0;

                        if (distance < range && influence > 0) {
                            const force = (1 - distance / range) * influence;
                            pull = Math.sin(distance * 0.06 - time * 0.004) * 28 * force;
                        }

                        const x = string.x + wave + pull;
                        if (y === -10) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }

                    ctx.stroke();
                });

                influence = Math.max(0, influence - 0.012);
                requestAnimationFrame(draw);
            }

            document.addEventListener('pointermove', (event) => {
                pointerX = event.clientX;
                pointerY = event.clientY;
                influence = Math.min(0.55, influence + 0.06);
            }, { passive: true });

            document.addEventListener('pointerleave', () => {
                pointerX = -9999;
                pointerY = -9999;
            });

            window.addEventListener('resize', resize);
            resize();
            requestAnimationFrame(draw);
        })();

        async function init() {
            splitText();
            renderChannels();
        }

        init();
    </script>
</body>
</html>
